<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT N5 SRS Flashcards</title>
    <style>
        :root {
            --primary: #ef4444; 
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --example-bg: #f1f5f9;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            width: 90%;
            max-width: 400px;
            perspective: 1000px;
            position: relative;
        }
        .card {
            width: 100%;
            height: 520px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-in-out;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            border-radius: 20px;
            background: var(--card-bg);
            text-align: center;
        }
        .card-face-back {
            transform: rotateY(180deg);
            text-align: left;
            justify-content: flex-start;
            overflow-y: auto;
            background: var(--card-bg);
            padding-bottom: 80px; /* Room for SRS buttons */
        }
        
        /* Edit Icon */
        .edit-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: #cbd5e1;
            z-index: 10;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .edit-icon:active { color: var(--primary); }

        /* Front Content */
        .pattern-name {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
        }
        .explanation {
            font-size: 1.1rem;
            color: #475569;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Back Content */
        .example-container {
            width: 100%;
            margin-bottom: 12px;
            background: var(--example-bg);
            padding: 12px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            box-sizing: border-box;
        }
        .example-jp {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: var(--text);
        }
        .example-en {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.3;
        }

        /* SRS Rating Buttons */
        .srs-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            box-sizing: border-box;
            background: linear-gradient(to top, white 80%, rgba(255,255,255,0));
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .card.is-flipped .srs-controls {
            opacity: 1;
            pointer-events: auto;
        }
        .srs-btn {
            flex: 1;
            margin: 0 5px;
            padding: 12px 0;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-again { background: #ef4444; }
        .btn-good { background: #10b981; }
        .btn-easy { background: #3b82f6; }
        .srs-interval {
            display: block;
            font-size: 0.7rem;
            font-weight: normal;
            margin-top: 3px;
            opacity: 0.9;
        }

        .progress {
            font-size: 1.1rem;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 20px;
        }
        .hint {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 20px;
            position: absolute;
            bottom: 20px;
        }

        /* Finished Screen */
        .finished-screen {
            display: none;
            text-align: center;
            color: var(--text);
        }
        .finished-screen h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Editing and Adding UI */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            cursor: pointer;
            z-index: 100;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 200;
        }
        .modal {
            background: white; padding: 20px; border-radius: 20px;
            width: 85%; max-width: 350px; display: flex; flex-direction: column;
            gap: 10px; max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { margin: 0 0 5px 0; color: var(--primary); font-size: 1.2rem; }
        .modal input, .modal textarea {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-family: inherit; box-sizing: border-box;
        }
        .modal textarea { height: 50px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 5px; }
        .modal-actions button { padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #e2e8f0; color: #334155; }
        .btn-confirm { background: #10b981; color: white; }
    </style>
</head>
<body>

    <div class="progress" id="progress">Due Today: 0</div>

    <div class="finished-screen" id="finished-screen">
        <h2>🎉 All Done!</h2>
        <p>You have reviewed all due cards for today.</p>
        <p style="font-size: 0.9rem; color: #64748b; margin-top: 20px;">Come back tomorrow for more.</p>
    </div>

    <div class="container" id="card-container">
        <div class="card" id="card">
            <button class="edit-icon" id="btn-edit-card">✏️</button>
            
            <div class="card-face card-face-front">
                <div class="pattern-name" id="pattern-name">Loading...</div>
                <div class="explanation" id="explanation"></div>
                <div class="hint">Tap to show answer</div>
            </div>
            
            <div class="card-face card-face-back">
                <div id="examples-display" style="width: 100%;">
                    <div class="example-container">
                        <div class="example-jp" id="ex1-jp">Loading...</div>
                        <div class="example-en" id="ex1-en"></div>
                    </div>
                    <div class="example-container">
                        <div class="example-jp" id="ex2-jp">Loading...</div>
                        <div class="example-en" id="ex2-en"></div>
                    </div>
                    <div class="example-container">
                        <div class="example-jp" id="ex3-jp">Loading...</div>
                        <div class="example-en" id="ex3-en"></div>
                    </div>
                </div>

                <div class="srs-controls">
                    <button class="srs-btn btn-again" onclick="rateCard('again')">Again <span class="srs-interval">&lt;10m</span></button>
                    <button class="srs-btn btn-good" onclick="rateCard('good')">Good <span class="srs-interval" id="int-good">1d</span></button>
                    <button class="srs-btn btn-easy" onclick="rateCard('easy')">Easy <span class="srs-interval" id="int-easy">4d</span></button>
                </div>
            </div>
        </div>
    </div>

    <button class="fab" id="btn-add-card">+</button>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h3 id="modal-title">Edit Card</h3>
            <input type="text" id="modal-pattern" placeholder="Pattern (e.g. 〜から)">
            <textarea id="modal-explanation" placeholder="Explanation..."></textarea>
            <textarea id="modal-ex1" placeholder="Ex 1: JP - EN"></textarea>
            <textarea id="modal-ex2" placeholder="Ex 2: JP - EN"></textarea>
            <textarea id="modal-ex3" placeholder="Ex 3: JP - EN"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel-modal">Cancel</button>
                <button class="btn-confirm" id="btn-confirm-modal">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Core SRS Configuration
        const DAY_MS = 24 * 60 * 60 * 1000;
        const MIN_10_MS = 10 * 60 * 1000;

        let allData = [];
        let dueQueue = [];
        let editingIndex = -1; // -1 means adding new, >=0 means editing existing

        // Initial Data Payload
        const defaultData = [
            { pat: "〜は (wa)", exp: "Topic marker. Indicates the topic of the sentence.", ex1jp: "私は学生です。", ex1en: "I am a student.", ex2jp: "今日は月曜日です。", ex2en: "Today is Monday.", ex3jp: "父は先生です。", ex3en: "My father is a teacher." },
            { pat: "〜が (ga)", exp: "Subject marker. Emphasizes the subject or introduces new information.", ex1jp: "雨が降っています。", ex1en: "It is raining.", ex2jp: "私がやります。", ex2en: "I will do it.", ex3jp: "車があります。", ex3en: "There is a car." },
            { pat: "〜を (wo)", exp: "Direct object marker. Indicates the receiver of an action.", ex1jp: "水を飲みます。", ex1en: "I drink water.", ex2jp: "本を読みます。", ex2en: "I read a book.", ex3jp: "手紙を書きます。", ex3en: "I write a letter." },
            { pat: "〜に (ni)", exp: "Indicates time, destination, or existence location.", ex1jp: "日本に行きます。", ex1en: "I will go to Japan.", ex2jp: "七時に起きます。", ex2en: "I wake up at seven o'clock.", ex3jp: "右に曲がります。", ex3en: "Turn to the right." },
            { pat: "〜で (de)", exp: "Indicates the location of an action or the means/tool used.", ex1jp: "電車で行きます。", ex1en: "I go by train.", ex2jp: "会社で働きます。", ex2en: "I work at the company.", ex3jp: "日本語で話します。", ex3en: "I speak in Japanese." },
            { pat: "〜へ (e)", exp: "Direction marker. Indicates movement toward a place.", ex1jp: "学校へ行きます。", ex1en: "I am going to school.", ex2jp: "家へ帰ります。", ex2en: "I will return home.", ex3jp: "北へ向かいます。", ex3en: "I head to the north." }
            // Note: Truncated default data for snippet brevity. Keep your original 40 array objects here!
        ];

        document.addEventListener("DOMContentLoaded", () => {
            initializeData();
            buildQueue();
            showNextCard();

            // Card Flip Event
            document.getElementById('card').addEventListener('click', (e) => {
                // Prevent flip if clicking buttons
                if (e.target.tagName.toLowerCase() === 'button' || e.target.closest('.srs-controls') || e.target.closest('.edit-icon')) return;
                document.getElementById('card').classList.add('is-flipped');
            });

            // Modal Listeners
            document.getElementById('btn-add-card').addEventListener('click', () => openModal(-1));
            document.getElementById('btn-edit-card').addEventListener('click', () => openModal(dueQueue[0].originalIndex));
            document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
            document.getElementById('btn-confirm-modal').addEventListener('click', saveModal);
        });

        function initializeData() {
            let savedData = localStorage.getItem('jlpt_n5_srs_data');
            
            // Migration / Init
            if (!savedData) {
                // First load: take default data and inject SRS tracking objects
                allData = defaultData.map(item => injectSRS(item));
            } else {
                allData = JSON.parse(savedData);
                // Ensure existing data has SRS properties (for smooth upgrades)
                allData = allData.map(item => injectSRS(item)); 
            }
            saveToStorage();
        }

        function injectSRS(item) {
            if (!item.srs) {
                item.srs = {
                    interval: 0,        // Days until next review
                    repetition: 0,      // Number of successful consecutive recalls
                    efactor: 2.5,       // Easiness factor
                    nextReview: 0       // Timestamp of next review (0 = due immediately)
                };
            }
            return item;
        }

        function buildQueue() {
            const now = Date.now();
            dueQueue = [];
            
            allData.forEach((item, index) => {
                if (item.srs.nextReview <= now) {
                    // Attach original index so we can update the main array later
                    dueQueue.push({ ...item, originalIndex: index }); 
                }
            });

            // Optional: Shuffle the due queue so it's not the same order every day
            dueQueue.sort(() => Math.random() - 0.5);
        }

        function showNextCard() {
            const container = document.getElementById('card-container');
            const finishedScreen = document.getElementById('finished-screen');
            const progress = document.getElementById('progress');

            progress.textContent = `Due Today: ${dueQueue.length}`;

            if (dueQueue.length === 0) {
                container.style.display = 'none';
                finishedScreen.style.display = 'block';
                document.getElementById('btn-add-card').style.display = 'none';
                return;
            }

            container.style.display = 'block';
            finishedScreen.style.display = 'none';
            document.getElementById('btn-add-card').style.display = 'flex';
            
            const cardElement = document.getElementById('card');
            cardElement.classList.remove('is-flipped');

            const current = dueQueue[0];

            setTimeout(() => {
                // Front
                document.getElementById('pattern-name').textContent = current.pat;
                document.getElementById('explanation').textContent = current.exp;
                
                // Back
                document.getElementById('ex1-jp').textContent = current.ex1jp;
                document.getElementById('ex1-en').textContent = current.ex1en;
                document.getElementById('ex2-jp').textContent = current.ex2jp;
                document.getElementById('ex2-en').textContent = current.ex2en;
                document.getElementById('ex3-jp').textContent = current.ex3jp;
                document.getElementById('ex3-en').textContent = current.ex3en;

                // Predict Next Intervals for the Buttons
                const srs = current.srs;
                const intGood = srs.repetition === 0 ? 1 : Math.round(srs.interval * srs.efactor);
                const intEasy = srs.repetition === 0 ? 4 : Math.round(srs.interval * srs.efactor * 1.3);
                
                document.getElementById('int-good').textContent = intGood + 'd';
                document.getElementById('int-easy').textContent = intEasy + 'd';
            }, 200);
        }

        // --- SRS Algorithm Logic ---
        window.rateCard = function(rating) {
            const current = dueQueue[0];
            const originalIndex = current.originalIndex;
            let srs = allData[originalIndex].srs;
            const now = Date.now();

            if (rating === 'again') {
                srs.repetition = 0;
                srs.interval = 0;
                srs.efactor = Math.max(1.3, srs.efactor - 0.2);
                srs.nextReview = now + MIN_10_MS; 
                
                // Move to the back of today's queue
                dueQueue.push(dueQueue.shift()); 
                saveToStorage();
                showNextCard();
                return; // Skip the shift below
            } 
            else if (rating === 'good') {
                srs.repetition += 1;
                srs.interval = srs.repetition === 1 ? 1 : Math.round(srs.interval * srs.efactor);
                srs.nextReview = now + (srs.interval * DAY_MS);
            } 
            else if (rating === 'easy') {
                srs.repetition += 1;
                srs.interval = srs.repetition === 1 ? 4 : Math.round(srs.interval * srs.efactor * 1.3);
                srs.efactor += 0.15;
                srs.nextReview = now + (srs.interval * DAY_MS);
            }

            // Save and remove from today's queue
            saveToStorage();
            dueQueue.shift();
            showNextCard();
        };

        // --- Modal (Adding/Editing) Logic ---
        function openModal(index) {
            editingIndex = index;
            const modalTitle = document.getElementById('modal-title');
            
            if (index >= 0) {
                modalTitle.textContent = "Edit Card";
                const item = allData[index];
                document.getElementById('modal-pattern').value = item.pat;
                document.getElementById('modal-explanation').value = item.exp;
                document.getElementById('modal-ex1').value = item.ex1jp + " - " + item.ex1en;
                document.getElementById('modal-ex2').value = item.ex2jp + " - " + item.ex2en;
                document.getElementById('modal-ex3').value = item.ex3jp + " - " + item.ex3en;
            } else {
                modalTitle.textContent = "Add New Card";
                document.getElementById('modal-pattern').value = '';
                document.getElementById('modal-explanation').value = '';
                document.getElementById('modal-ex1').value = '';
                document.getElementById('modal-ex2').value = '';
                document.getElementById('modal-ex3').value = '';
            }
            
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        function saveModal() {
            const pat = document.getElementById('modal-pattern').value.trim();
            const exp = document.getElementById('modal-explanation').value.trim();
            if (!pat || !exp) { alert("Pattern and Explanation are required."); return; }

            const splitEx = (raw) => {
                const parts = raw.split('-');
                return { jp: parts[0] ? parts[0].trim() : "", en: parts[1] ? parts[1].trim() : "" };
            };

            const e1 = splitEx(document.getElementById('modal-ex1').value);
            const e2 = splitEx(document.getElementById('modal-ex2').value);
            const e3 = splitEx(document.getElementById('modal-ex3').value);

            if (editingIndex >= 0) {
                // Update Existing
                let item = allData[editingIndex];
                item.pat = pat; item.exp = exp;
                item.ex1jp = e1.jp; item.ex1en = e1.en;
                item.ex2jp = e2.jp; item.ex2en = e2.en;
                item.ex3jp = e3.jp; item.ex3en = e3.en;
                
                // Update the current item in the queue so UI reflects immediately
                Object.assign(dueQueue[0], item); 
            } else {
                // Add New
                let newItem = injectSRS({
                    pat: pat, exp: exp,
                    ex1jp: e1.jp, ex1en: e1.en,
                    ex2jp: e2.jp, ex2en: e2.en,
                    ex3jp: e3.jp, ex3en: e3.en
                });
                allData.push(newItem);
                // Force it to be due immediately
                dueQueue.unshift({ ...newItem, originalIndex: allData.length - 1 });
            }

            saveToStorage();
            closeModal();
            showNextCard();
        }

        function saveToStorage() {
            localStorage.setItem('jlpt_n5_srs_data', JSON.stringify(allData));
        }
    </script>
</body>
</html>
